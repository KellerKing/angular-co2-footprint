<h1 matDialogTitle>Einstellungen</h1>
<mat-dialog-content>
  <div class="form-check form-switch mt-2">
    <form>
      <div class="form-group mb-2">
        <label for="land">Land:</label>
        <input type="checkbox" [checked]="einstellungenForm.isRtl" id="land" class="form-control" />
      </div>
    </form>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close class="btn btn-primary">Okay</button>
</mat-dialog-actions>
